apiVersion: score.dev/v1b1
metadata:
  name: ingress
  annotations:
    tags: "nginx,ingress"
containers:
  ingress:
    image: .
    variables:
      DATABASE_URL: "${resources.database.url}"
      TRADE_PROCESSOR_URL: "${resources.trade-processor.url}"
      POSITION_SERVICE_URL: "${resources.position-service.url}"
      PEOPLE_SERVICE_URL: "${resources.people-service.url}"
      REFERENCE_DATA_URL: "${resources.reference-data.url}"
      ACCOUNT_SERVICE_URL: "${resources.account-service.url}"
      WEB_FRONTEND_URL: "${resources.web-frontend.url}"
      TRADE_SERVICE_URL: "${resources.trade-service.url}"
      TRADE_FEED_URL: "${resources.trade-feed.url}"
service:
  ports:
    web:
      port: 8080
      targetPort: 8080
resources:
  people-service:
    type: service
    params:
      port: 18089
      artifacts: api-mocks/people-service-openapi.json:true,api-mocks/people-service-metadata.yaml:false,api-mocks/people-service-examples.yaml:false
      name: FINOS TraderX People Service
      version: v1
  position-service:
    type: service
    params:
      port: 18090
      artifacts: api-mocks/position-service-openapi.json:true,api-mocks/position-service-examples.yaml:false
      name: FINOS TraderX Position Service
      version: 0.1.0
  trade-service:
    type: service
    params:
      port: 18092
  account-service:
    type: service
    params:
      port: 18088
      artifacts: api-mocks/account-service-openapi.json:true,api-mocks/account-service-examples.yaml:false
      name: FINOS TraderX Account Service
      version: 0.1.0
  reference-data:
    type: service
    params:
      port: 18085
      artifacts: api-mocks/reference-data-openapi.json:true,api-mocks/reference-data-examples.yaml:false
      name: FINOS TraderX Reference Data
      version: '1.0'
  trade-feed:
    type: service
    params:
      port: 18086
  trade-processor:
    type: service
    params:
      port: 18091
      artifacts: api-mocks/trade-processor-openapi.json:true,api-mocks/trade-processor-examples.yaml:false
      name: FINOS TraderX Trade Processor
      version: 0.1.0
  web-frontend:
    type: service
    params:
      port: 18093
  database:
    type: service
    params:
      port: 18084
  dns:
    type: dns
  route:
    type: route
    params:
      host: ${resources.dns.host}
      path: /
      port: 8080