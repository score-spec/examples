apiVersion: score.dev/v1b1
metadata:
  name: ingress
  annotations:
    tags: "nginx,ingress"
containers:
  ingress:
    image: .
    variables:
      DATABASE_TCP_HOST: "${resources.database.name}"
service:
  ports:
    web:
      port: 8080
      targetPort: 8080
resources:
  #people-service:
  #  type: service
  trade-service:
    type: service
  #account-service:
  #  type: service
  #reference-data:
  #  type: service
  trade-feed:
    type: service
  trade-processor:
    type: service
    params:
      port: 18091
      artifacts: api-mocks/trade-processor-openapi.json:true,api-mocks/trade-processor-examples.yaml:false
      name: FINOS TraderX Trade Processor
      version: 0.1.0
  web-frontend:
    type: service
  database:
    type: service
  dns:
    type: dns
  route:
    type: route
    params:
      host: ${resources.dns.host}
      path: /
      port: 8080