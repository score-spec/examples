apiVersion: score.dev/v1b1
metadata:
  name: trade-processor
  annotations:
    tags: "java,spring"
containers:
  trade-processor:
    image: ghcr.io/finos/traderx/trade-processor:latest
    variables:
      DATABASE_TCP_HOST: "${resources.database.name}"
      TRADE_FEED_ADDRESS: "${resources.trade-feed.url}"
service:
  ports:
    web:
      port: 18091
      targetPort: 18091
resources:
  trade-feed:
    type: service
    params:
      port: 18086
  database:
    type: service