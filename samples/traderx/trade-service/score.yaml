apiVersion: score.dev/v1b1
metadata:
  name: trade-service
  annotations:
    tags: "java,spring"
containers:
  trade-service:
    image: ghcr.io/finos/traderx/trade-service:latest
    variables:
      DATABASE_TCP_HOST: "${resources.database.name}"
      PEOPLE_SERVICE_HOST: "people-service" # "${resources.people-service.name}"
      ACCOUNT_SERVICE_HOST: "account-service" # "${resources.account-service.name}"
      REFERENCE_DATA_HOST: "reference-data" # "${resources.reference-data.name}"
      TRADE_FEED_HOST: "${resources.trade-feed.name}"
service:
  ports:
    web:
      port: 18092
      targetPort: 18092
resources:
  people-service:
    type: endpoint
    params:
      port: 8181
      openapi_file: resources/people-service-openapi.json
      openapi_title: FINOS TraderX People Service
  trade-feed:
    type: service
  account-service:
    type: endpoint
    params:
      port: 8181
      openapi_file: resources/account-service-openapi.json
      openapi_title: FINOS TraderX Account Service
  reference-data:
    type: endpoint
    params:
      port: 8181
      openapi_file: resources/reference-data-openapi.json
      openapi_title: FINOS TraderX Reference Data
  database:
    type: service